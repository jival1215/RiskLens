services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: risklens
      POSTGRES_USER: risklens
      POSTGRES_PASSWORD: risklens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U risklens -d risklens"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://risklens:risklens@postgres:5432/risklens
      MODEL_PATH: /app/app/artifacts/credit_risk_model.joblib
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/app/artifacts:/app/app/artifacts

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
